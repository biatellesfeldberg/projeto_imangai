# Publica a pasta site/ no GitHub Pages (URL pública).
# Após cada push na main, o mapa fica em:
#   https://biatellesfeldberg.github.io/projeto_imangai/
name: Publicar mapa (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publicar:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Atualizar dados do mapa a partir do CSV
        run: |
          if [ -f saida/casas_filtradas.csv ]; then
            python gerar_mapa.py --entrada saida/casas_filtradas.csv --pasta-site site
          else
            python -c "from pathlib import Path; from gerar_mapa import atualizar_versao_cache; atualizar_versao_cache(Path('site'))"
            echo "CSV ausente; versão do cache atualizada."
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deploy
        uses: actions/deploy-pages@v4
